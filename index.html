<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Architect</title>
    <style>
        :root { --gold: #d4af37; --bg: #1a1a1a; --text: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { color: var(--gold); text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { background: var(--gold); color: black; font-weight: bold; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { border-bottom: 1px solid #444; padding: 10px; text-align: left; }
        .actions { margin-top: 20px; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Expense Architect</h2>
    <form id="expenseForm">
        <input type="text" id="desc" placeholder="What was it for?" required>
        <select id="category">
            <option value="Meals">Meals</option>
            <option value="Travel">Travel</option>
            <option value="Home Office">Home Office</option>
            <option value="Tech">Tech</option>
            <option value="Cars">Cars</option>
        </select>
        <input type="number" id="amount" placeholder="Amount ($)" required>
        <button type="submit">Log Expense</button>
    </form>

    <table>
        <thead><tr><th>Category</th><th>Details</th><th>$</th></tr></thead>
        <tbody id="expenseList"></tbody>
    </table>

    <div class="actions">
        <button onclick="downloadCSV()">Export to CSV</button>
        <button onclick="clearData()" style="background:#555;">Clear List</button>
    </div>
</div>

<script>
    const form = document.getElementById('expenseForm');
    const list = document.getElementById('expenseList');

    function loadData() {
        const data = JSON.parse(localStorage.getItem('expenses') || '[]');
        list.innerHTML = data.map(item => `<tr><td>${item.category}</td><td>${item.desc}</td><td>$${item.amount}</td></tr>`).join('');
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const entry = {
            category: document.getElementById('category').value,
            desc: document.getElementById('desc').value,
            amount: document.getElementById('amount').value
        };
        const data = JSON.parse(localStorage.getItem('expenses') || '[]');
        data.push(entry);
        localStorage.setItem('expenses', JSON.stringify(data));
        form.reset();
        loadData();
    });

    function downloadCSV() {
        const data = JSON.parse(localStorage.getItem('expenses') || '[]');
        let csv = 'Category,Description,Amount\n';
        data.forEach(item => csv += `${item.category},"${item.desc}",${item.amount}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'expenses.csv');
        a.click();
    }

    function clearData() { if(confirm('Clear all data?')) { localStorage.removeItem('expenses'); loadData(); } }
    loadData();
</script>
</body>
</html>
